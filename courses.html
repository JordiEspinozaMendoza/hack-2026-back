<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Streaming Course Generator</title>

  <style>
    body {
      font-family: Arial;
      padding: 40px;
      background: #f5f5f5;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      cursor: pointer;
    }

    .section {
      margin-top: 25px;
    }

    pre {
      background: #111;
      color: #0f0;
      padding: 15px;
      height: 200px;
      overflow-y: auto;
    }

    .lecture {
      border: 1px solid #ddd;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      background: #fafafa;
    }

    .lecture h4 {
      margin: 0 0 5px 0;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🚀 Streaming Course Generator</h2>

    <input id="name" placeholder="transcript file (e.g. test.txt)" />
    <button onclick="start()">Start</button>

    <div class="status" id="status">Idle</div>

    <div class="section">
      <h3>📡 Logs</h3>
      <pre id="log"></pre>
    </div>


    <!-- ENHANCE LESSONS SECTION -->
    <div class="section">
      <h3>🎨 Enhanced Lessons</h3>

      <!-- ASK FOR TRANSCRIPT NAME AND LESSON NAME -->
      <input id="transcriptName" placeholder="Transcript Name" />
      <input id="lessonName" placeholder="Lesson Name" />
      <button onclick="enhanceLesson()">Enhance Lesson</button>
      <div id="enhancedLog"
        style="margin-top: 15px; background: #111; color: #0f0; padding: 15px; height: 200px; overflow-y: auto;"></div>
      <div id="finalMarkdown"
        style="margin-top: 15px; background: #eee; color: #000; padding: 15px; height: auto; overflow-y: auto;"></div>
    </div>

    <!-- CREATE QUIZ SECTION -->
    <div class="section">
      <h3>📝 Create Quiz</h3>
      <textarea id="quizContent" placeholder="Lesson Content for Quiz" style="height: 80px; width: 100%;"></textarea>
      <button onclick="generateQuiz()">Generate Quiz</button>
      <div id="quizResult"
        style="margin-top: 15px; background: #eee; color: #000; padding: 15px; height: auto; overflow-y: auto;"></div>
    </div>
  </div>

  <script>
    async function start() {
      const name = document.getElementById("name").value;
      const log = document.getElementById("log");

      log.textContent = "";

      console.log("Starting course generation for transcript:", name);

      const response = await fetch(
        `http://localhost:8000/generate-course-stream?transcript_name=${encodeURIComponent(name)}`
      );

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      let buffer = "";

      let done = false;
      let fullText = "";

      while (!done) {
        const { value, done: doneReading } = await reader.read();
        done = doneReading;

        const chunk = decoder.decode(value || new Uint8Array());
        fullText += chunk;
        log.textContent = fullText;
        // auto-scroll
        log.scrollTop = log.scrollHeight;
      }
    }

    async function enhanceLesson() {
      const transcriptName = document.getElementById("transcriptName").value;
      const lessonName = document.getElementById("lessonName").value;
      const enhancedLog = document.getElementById("enhancedLog");

      enhancedLog.textContent = "";

      const response = await fetch(
        `http://localhost:8000/enhance-lesson-stream?transcript_name=${encodeURIComponent(transcriptName)}&lesson_name=${encodeURIComponent(lessonName)}`
      );

      const reader = response.body.getReader();
      const decoder = new TextDecoder();

      let fullText = "";
      let done = false;

      while (!done) {
        const { value, done: doneReading } = await reader.read();
        done = doneReading;

        const chunk = decoder.decode(value || new Uint8Array());
        fullText += chunk;
        enhancedLog.textContent = fullText;
        // auto-scroll
        enhancedLog.scrollTop = enhancedLog.scrollHeight;
      }

      // After streaming is done, display the final enhanced lesson in the "finalMarkdown" div
      const finalMarkdown = document.getElementById("finalMarkdown");
      finalMarkdown.innerHTML = marked.parse(fullText);
    }

    async function generateQuiz() {
      const quizContent = document.getElementById("quizContent").value;
      const quizResult = document.getElementById("quizResult");

      quizResult.textContent = "";

      const response = await fetch(
        `http://localhost:8000/generate-quiz`,
        {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ lesson_content: quizContent })
        }
      );

      const quiz = await response.json();
      quizResult.innerHTML = JSON.stringify(quiz, null, 2);
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</body>

</html>
